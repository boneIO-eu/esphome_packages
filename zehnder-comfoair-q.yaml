climate:
  - platform: thermostat
    name: "${device_name} Climate"
    id: comfoair_climate
    sensor: extract_air_temp
    icon: mdi:air-filter
    visual:
      min_temperature: 18
      max_temperature: 25
      temperature_step: 0.5
    min_heating_off_time: 1s
    min_heating_run_time: 1s
    min_cooling_off_time: 1s
    min_cooling_run_time: 1s
    min_idle_time: 1s
    cool_deadband: 0.1
    cool_overrun: 0.1
    heat_deadband: 0.1
    heat_overrun: 0.1
    default_preset: home
    preset:
      - name: comfort
        default_target_temperature_low: 23 °C
        default_target_temperature_high: 24 °C
      - name: home
        default_target_temperature_low: 22 °C
        default_target_temperature_high: 23 °C
      - name: sleep
        default_target_temperature_low: 21 °C
        default_target_temperature_high: 22 °C
    heat_action:
      - select.set:
          id: temperature_profile_select
          option: "Warm"
    idle_action:
      - select.set:
          id: temperature_profile_select
          option: "Normal"
    cool_action:
      - select.set:
          id: temperature_profile_select
          option: "Cool"

fan:
  - platform: speed
    name: '${device_name} Fan'
    id: ${fan_id}
    icon: mdi:air-filter
    output: comfoair_fan_output
    speed_count: 3
    on_turn_on:
      - switch.turn_on: auto_ventilation
    on_turn_off:
      - select.set:
          id: fan_level_select
          option: "Away"
    on_speed_set:
      - if:
          condition:
            and:
              - fan.is_on: ${fan_id}
              - not:
                  lambda: return int(id(fan_level_raw).state) == id(${fan_id}).speed;
          then:
            - select.set:
                id: fan_level_select
                option: !lambda |
                  if (id(${fan_id}).speed == 0) {
                    return "Away";
                  } else if (id(${fan_id}).speed == 1) {
                    return "Low";
                  } else if (id(${fan_id}).speed == 2) {
                    return "Medium";
                  } else if (id(${fan_id}).speed == 3) {
                    return "High";
                  } else {
                    return "Unknown";
                  }

switch:
  - platform: template
    name: "${device_name} Auto Ventilation"
    id: auto_ventilation
    icon: mdi:toggle-switch
    turn_on_action:
      - if:
          condition:
            or:
              - text_sensor.state:
                  id: operating_mode
                  state: "Boost"
              - text_sensor.state:
                  id: operating_mode
                  state: "Boost (RF)"
          then:
            - lambda: id(${comfoair_id})->set_boost(0);
            - delay: 1s
      - if:
          condition:
            text_sensor.state:
              id: operating_mode
              state: "Manual (limited)"
          then:
            - lambda: id(${comfoair_id})->set_manual_mode(true);
            - delay: 1s
      - lambda: id(${comfoair_id})->set_manual_mode(false);
      - delay: 1s
      - if:
          condition:
            or:
              - text_sensor.state:
                  id: operating_mode
                  state: "Boost"
              - text_sensor.state:
                  id: operating_mode
                  state: "Boost (RF)"
          then:
            - lambda: id(${comfoair_id})->set_boost(0);
            - delay: 1s
    turn_off_action:
      - lambda: id(${comfoair_id})->set_manual_mode(true);
  - platform: template
    name: "${device_name} Away Mode"
    id: away_mode
    icon: mdi:airplane
    turn_on_action:
      - lambda: id(${comfoair_id})->set_away(true);
      - delay: 1s
    turn_off_action:
      - lambda: id(${comfoair_id})->set_away(false);
      - delay: 1s

binary_sensor:
  - platform: template
    id: away_indicator # PDO 16 (raw)
    name: "${device_name} Away Indicator"
    icon: mdi:airplane
    on_press:
      then:
        - switch.template.publish:
            id: away_mode
            state: ON
    on_release:
      then:
        - switch.template.publish:
            id: away_mode
            state: OFF
  - platform: template
    id: heating_season # PDO 210 (raw)
    name: "${device_name} Heating Season"
    icon: mdi:snowflake-thermometer
  - platform: template
    id: cooling_season # PDO 211 (raw)
    name: "${device_name} Cooling Season"
    icon: mdi:sun-thermometer
