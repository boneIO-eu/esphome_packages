    name: "${device_name} Avoided Heating YTD"
    accuracy_decimals: 0
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
  - platform: template
    id: avoided_heating_total # PDO 215
    name: "${device_name} Avoided Heating Total"
    accuracy_decimals: 0
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
  - platform: template
    id: avoided_cooling_actual # PDO 216
    name: "${device_name} Avoided Cooling Actual"
    filters: *throttle-filter-e-3
    accuracy_decimals: 3
    unit_of_measurement: "kW"
    device_class: power
