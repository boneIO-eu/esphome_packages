# Zehnder ComfoAir Q integration via CAN bus (boneIO).
# Requires a boneIO board (or any ESP32) with CAN transceiver wired to GPIO5 (TX) / GPIO4 (RX).
# Uses external component: https://github.com/belsander/esphome-zehnder-comfoair

substitutions:
  # Device identification
  device_name: 'Zehnder'
  comfoair_id: 'comfoair'
  fan_id: 'comfoair_fan'

  # Filters
  filter_time: 5s
  filter_send_every: "1"
  filter_window_size: "3"

external_components:
  - source: github://belsander/esphome-zehnder-comfoair@main
    components: [ zehnder_comfoair_q ]

# ──────────────────────────────────────────────
# KOMPONENTY ZEHNDER COMFOAIR Q & CANBUS
# ──────────────────────────────────────────────
zehnder_comfoair_q:
  id: ${comfoair_id}
  request_ids: [16, 49, 54, 55, 65, 66, 67, 81, 82, 117, 118, 119, 120, 121, 122, 128, 129, 130, 192, 209, 210, 211, 212, 212, 213, 214, 215, 216, 217, 218, 220, 221, 225, 227, 274, 275, 276, 277, 278, 290, 291, 292, 293, 294]

canbus:
  - platform: esp32_can
    tx_pin: GPIO5
    rx_pin: GPIO4
    bit_rate: 50kbps
    can_id: 0
    on_frame:
      - can_id: 0
        can_id_mask: 0
        use_extended_id: true
        then:
          - lambda: |-
              auto data_pretty = remote_transmission_request ? "n/a" : format_hex_pretty(x).c_str();
              if ((can_id & 0b11111000000000011111111000000) == 0b00000000000000000000001000000)
              {
                ESP_LOGD("comfoair_dump", "Node: %ld, PDO: %ld, rtr: %d, length: %d, content: %s (can_id: 0x%08lx)", can_id & 0x3f, can_id >> 14, remote_transmission_request, x.size(), data_pretty, can_id);
              }
              else
              {
                ESP_LOGV("comfoair_dump", "can_id: 0x%08lx, rtr: %d, length: %d, content: %s", can_id, remote_transmission_request, x.size(), data_pretty);
              }
      - can_id: 0b00000000000000000000001000000
        can_id_mask: 0b11111000000000011111111000000
        use_extended_id: true
        remote_transmission_request: false
        then:
          - lambda: |-
              auto pdo_id = id(${comfoair_id})->get_pdo_id_from_can_id (can_id);
              switch (pdo_id)
              {
                  comfoair_on_frame_case( 16, id(${comfoair_id}), away_indicator_raw,                true);
                  comfoair_on_frame_case( 49, id(${comfoair_id}), operating_mode,                    true);
                  comfoair_on_frame_case( 54, id(${comfoair_id}), supply_fan_mode,                   true);
                  comfoair_on_frame_case( 55, id(${comfoair_id}), exhaust_fan_mode,                  true);
                  comfoair_on_frame_case( 65, id(${comfoair_id}), fan_level_raw,                     true);
                  comfoair_on_frame_case( 66, id(${comfoair_id}), bypass_activation_mode,            true);
                  comfoair_on_frame_case( 67, id(${comfoair_id}), temperature_profile,                true);
                  comfoair_on_frame_case( 81, id(${comfoair_id}), next_fan_change_in_raw,           false);
                  comfoair_on_frame_case( 82, id(${comfoair_id}), next_bypass_change_in_raw,        false);
                  comfoair_on_frame_case(117, id(${comfoair_id}), exhaust_fan_duty,                 false);
                  comfoair_on_frame_case(118, id(${comfoair_id}), supply_fan_duty,                  false);
                  comfoair_on_frame_case(119, id(${comfoair_id}), exhaust_fan_flow,                  false);
                  comfoair_on_frame_case(120, id(${comfoair_id}), supply_fan_flow,                   false);
                  comfoair_on_frame_case(121, id(${comfoair_id}), exhaust_fan_speed,                 true);
                  comfoair_on_frame_case(122, id(${comfoair_id}), supply_fan_speed,                  true);
                  comfoair_on_frame_case(128, id(${comfoair_id}), power,                             true);
                  comfoair_on_frame_case(129, id(${comfoair_id}), energy_ytd,                        true);
                  comfoair_on_frame_case(130, id(${comfoair_id}), energy_since_start,                true);
                  comfoair_on_frame_case(192, id(${comfoair_id}), filter_replacement_remaining_days, false);
                  comfoair_on_frame_case(209, id(${comfoair_id}), running_mean_outdoor_temp,        false);
                  comfoair_on_frame_case(210, id(${comfoair_id}), heating_season_raw,                true);
                  comfoair_on_frame_case(211, id(${comfoair_id}), cooling_season_raw,                true);
                  comfoair_on_frame_case(212, id(${comfoair_id}), profile_target_temp,               false);
                  comfoair_on_frame_case(213, id(${comfoair_id}), avoided_heating_actual,            true);
                  comfoair_on_frame_case(214, id(${comfoair_id}), avoided_heating_ytd,               true);
                  comfoair_on_frame_case(215, id(${comfoair_id}), avoided_heating_total,             true);
                  comfoair_on_frame_case(216, id(${comfoair_id}), avoided_cooling_actual,            true);
                  comfoair_on_frame_case(217, id(${comfoair_id}), avoided_cooling_ytd,               true);
                  comfoair_on_frame_case(218, id(${comfoair_id}), avoided_cooling_total,             true);
                  comfoair_on_frame_case(220, id(${comfoair_id}), pre_heater_temp_before,           false);
                  comfoair_on_frame_case(221, id(${comfoair_id}), post_heater_temp_after,           false);
                  comfoair_on_frame_case(225, id(${comfoair_id}), ventilation_mode,                  true);
                  comfoair_on_frame_case(227, id(${comfoair_id}), bypass_state,                      true);
                  comfoair_on_frame_case(274, id(${comfoair_id}), extract_air_temp,                 false);
                  comfoair_on_frame_case(275, id(${comfoair_id}), exhaust_air_temp,                 false);
                  comfoair_on_frame_case(276, id(${comfoair_id}), outdoor_air_temp,                 false);
                  comfoair_on_frame_case(277, id(${comfoair_id}), pre_heater_temp_after,            false);
                  comfoair_on_frame_case(278, id(${comfoair_id}), supply_air_temp,                  false);
                  comfoair_on_frame_case(290, id(${comfoair_id}), extract_air_humidity,              true);
                  comfoair_on_frame_case(291, id(${comfoair_id}), exhaust_air_humidity,              true);
                  comfoair_on_frame_case(292, id(${comfoair_id}), outdoor_air_humidity,              true);
                  comfoair_on_frame_case(293, id(${comfoair_id}), pre_heater_humidity_after,         true);
                  comfoair_on_frame_case(294, id(${comfoair_id}), supply_air_humidity,               true);
              }

# ──────────────────────────────────────────────
# ZMIENNE FILTRÓW (YAML Anchors)
# ──────────────────────────────────────────────
.throttle-filter: &throttle-filter
  - throttle_average: "${filter_time}"
  - filter_out: nan
  - sliding_window_moving_average:
      {send_every: "${filter_send_every}", window_size: "${filter_window_size}"}

.throttle-filter-round-tens: &throttle-filter-round-tens
  - throttle_average: "${filter_time}"
  - filter_out: nan
  - sliding_window_moving_average:
      {send_every: "${filter_send_every}", window_size: "${filter_window_size}"}
  - lambda: return round(x/10)*10;

.throttle-filter-e-3: &throttle-filter-e-3
  - throttle_average: "${filter_time}"
  - filter_out: nan
  - sliding_window_moving_average:
      {send_every: "${filter_send_every}", window_size: "${filter_window_size}"}
  - multiply: 0.001

output:
  # ZEHNDER VIRTUAL OUTPUT
  - platform: template
    id: comfoair_fan_output
    type: float
    zero_means_zero: true
    write_action:
      - logger.log: "Fan Speed was changed!"

sensor:
  - platform: template
    id: away_indicator_raw # PDO 16
    name: "${device_name} away_indicator_raw"
    internal: true
    accuracy_decimals: 0
    on_value:
      then:
        - lambda: id(away_indicator).publish_state(x == 7);
  - platform: template
    id: fan_level_raw # PDO 65
    name: "${device_name} fan_level_raw"
    internal: true
    accuracy_decimals: 0
    on_value:
      then:
        - lambda: id(fan_level).publish_state(std::to_string(int(x)));
        - if:
            condition:
              lambda: "return int(x) == 0;"
            then:
              - fan.turn_off: ${fan_id}
            else:
              - fan.turn_on:
                  id: ${fan_id}
                  speed: !lambda "return int(x);"
  - platform: template
    id: next_fan_change_in_raw # PDO 81
    name: "${device_name} next_fan_change_in_raw"
    accuracy_decimals: 0
    device_class: duration
    unit_of_measurement: "s"
    internal: true
    filters:
      - throttle: 0.5s
    on_value:
      then:
        - lambda: id(next_fan_change_in).publish_state(id(${comfoair_id})->seconds_to_human_readable(x));
  - platform: template
    id: next_bypass_change_in_raw # PDO 82
    name: "${device_name} next_bypass_change_in_raw"
    accuracy_decimals: 0
    device_class: duration
    unit_of_measurement: "s"
    internal: true
    filters:
      - throttle: 0.5s
    on_value:
      then:
        - lambda: id(next_bypass_change_in).publish_state(id(${comfoair_id})->seconds_to_human_readable(x));
  - platform: template
    id: exhaust_fan_duty # PDO 117
    name: "${device_name} Exhaust Fan Duty"
    accuracy_decimals: 0
    unit_of_measurement: "%"
    state_class: measurement
    filters: *throttle-filter
  - platform: template
    id: supply_fan_duty # PDO 118
    name: "${device_name} Supply Fan Duty"
    accuracy_decimals: 0
    unit_of_measurement: "%"
    state_class: measurement
    filters: *throttle-filter
  - platform: template
    id: supply_fan_flow # PDO 119
    name: "${device_name} Supply Fan Flow"
    icon: mdi:gauge
    accuracy_decimals: 0
    unit_of_measurement: "m³/h"
    state_class: measurement
    filters: *throttle-filter
  - platform: template
    id: exhaust_fan_flow # PDO 120
    name: "${device_name} Exhaust Fan Flow"
    icon: mdi:gauge
    accuracy_decimals: 0
    unit_of_measurement: "m³/h"
    state_class: measurement
    filters: *throttle-filter
  - platform: template
    id: exhaust_fan_speed # PDO 121
    name: "${device_name} Exhaust Fan Speed"
    icon: mdi:speedometer
    accuracy_decimals: 0
    unit_of_measurement: "rpm"
    state_class: measurement
    filters: *throttle-filter-round-tens
  - platform: template
    id: supply_fan_speed # PDO 122
    name: "${device_name} Supply Fan Speed"
    icon: mdi:speedometer
    accuracy_decimals: 0
    unit_of_measurement: "rpm"
    state_class: measurement
    filters: *throttle-filter-round-tens
  - platform: template
    id: power # PDO 128
    name: "${device_name} Power"
    accuracy_decimals: 0
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    filters: *throttle-filter
  - platform: template
    id: energy_ytd # PDO 129
    name: "${device_name} Energy YTD"
    accuracy_decimals: 0
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
  - platform: template
    id: energy_since_start # PDO 130
    name: "${device_name} Energy Since Start"
    accuracy_decimals: 0
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
  - platform: template
    id: filter_replacement_remaining_days # PDO 192
    name: "${device_name} Filter Replacement Remaining Days"
    icon: mdi:air-filter
    accuracy_decimals: 0
    unit_of_measurement: "days"
  - platform: template
    id: running_mean_outdoor_temp # PDO 209
    name: "${device_name} Running Mean Outdoor Temperature"
    filters: [multiply: 0.1]
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
  - platform: template
    id: heating_season_raw # PDO 210
    accuracy_decimals: 0
    on_value:
      then:
        - lambda: id(heating_season).publish_state(x == 1);
  - platform: template
    id: cooling_season_raw # PDO 211
    accuracy_decimals: 0
    on_value:
      then:
        - lambda: id(cooling_season).publish_state(x == 1);
  - platform: template
    id: profile_target_temp # PDO 212
    name: "${device_name} Profile Target Temperature"
    filters: [multiply: 0.1]
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
  - platform: template
