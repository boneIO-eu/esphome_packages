text_sensor:
  - platform: template
    id: fan_level # PDO 65 (raw)
    name: "${device_name} Fan Level"
    icon: mdi:fan
    filters:
      - map:
          - 0 -> Away
          - 1 -> Low
          - 2 -> Medium
          - 3 -> High
    on_value:
      then:
        - lambda: id(fan_level_select).publish_state(x);
  - platform: template
    id: operating_mode # PDO 49
    name: "${device_name} Operating Mode"
    filters:
      - map:
          - 1 -> Manual (limited)
          - 2 -> PRESETRF
          - 3 -> PRESETANALOG
          - 4 -> PRESETRFANALOG
          - 5 -> Manual (permanent)
          - 6 -> Boost
          - 7 -> Boost (RF)
          - 8 -> Bathroom Switch
          - 11 -> Away
          - 255 -> Auto
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "Auto";'
            then:
              - switch.template.publish:
                  id: auto_ventilation
                  state: ON
            else:
              - switch.template.publish:
                  id: auto_ventilation
                  state: OFF
  - platform: template
    id: supply_fan_mode # PDO 54
    name: "${device_name} Supply Fan Mode"
    icon: mdi:home-import-outline
    filters:
      - map:
          - 1 -> Supply Only
          - 255 -> Balanced
    on_value:
      if:
        condition:
          lambda: 'return x == "Supply Only";'
        then:
          - lambda: id(balance_mode).publish_state(x);
        else:
          if:
            condition:
              lambda: 'return id(exhaust_fan_mode).state == "Balanced";'
            then:
              - lambda: id(balance_mode).publish_state(x);
  - platform: template
    id: exhaust_fan_mode # PDO 55
    name: "${device_name} Exhaust Fan Mode"
    icon: mdi:home-export-outline
    filters:
      - map:
          - 1 -> Exhaust Only
          - 255 -> Balanced
    on_value:
      if:
        condition:
          lambda: 'return x == "Exhaust Only";'
        then:
          - lambda: id(balance_mode).publish_state(x);
        else:
          if:
            condition:
              lambda: 'return id(supply_fan_mode).state == "Balanced";'
            then:
              - lambda: id(balance_mode).publish_state(x);
  - platform: template
    id: balance_mode # PDO 55
    name: "${device_name} Balance Mode"
    icon: mdi:arrow-split-vertical
    on_value:
      then:
        - lambda: id(balance_mode_select).publish_state(x);
  - platform: template
    id: bypass_activation_mode # PDO 66
    name: "${device_name} Bypass Activation Mode"
    filters:
      - map:
          - 0 -> Auto
          - 1 -> Activated
          - 2 -> Deactivated
  - platform: template
    id: temperature_profile # PDO 67
    name: "${device_name} Temperature Profile"
    filters:
      - map:
          - 0 -> Normal
          - 1 -> Cool
          - 2 -> Warm
    on_value:
      then:
        - lambda: id(temperature_profile_select).publish_state(x);
  - platform: template
    id: next_fan_change_in # PDO 81 (raw)
    name: "${device_name} Next Fan Change In"
  - platform: template
    id: next_bypass_change_in # PDO 81 (raw)
    name: "${device_name} Next Bypass Change In"
  - platform: template
    id: ventilation_mode # PDO 225
    name: "${device_name} Ventilation Mode"
    filters:
      - map:
          - 0 -> Disabled
          - 1 -> Active
          - 2 -> Overruling

button:
  - platform: template
    name: "${device_name} Boost (15 min)"
    icon: mdi:fast-forward-15
    on_press:
      - lambda: id(${comfoair_id})->set_boost(15 * 60);
  - platform: template
    name: "${device_name} Boost (60 min)"
    icon: mdi:fast-forward-60
    on_press:
      - lambda: id(${comfoair_id})->set_boost(60 * 60);
  - platform: template
    name: "${device_name} Boost (3h)"
    icon: mdi:numeric-3-circle
    on_press:
      - lambda: id(${comfoair_id})->set_boost(3 * 60 * 60);
  - platform: template
    name: "${device_name} Boost (12h)"
    icon: mdi:dice-d12
    on_press:
      - lambda: id(${comfoair_id})->set_boost(12 * 60 * 60);
  - platform: template
    name: "${device_name} Boost off"
    icon: mdi:stop
    on_press:
      - lambda: id(${comfoair_id})->set_boost(0);
  - platform: template
    name: "${device_name} Bypass On (1h)"
    icon: mdi:fan-chevron-up
    on_press:
      - lambda: id(${comfoair_id})->set_bypass_mode(zehnder_comfoair_q::BYPASS_ACTIVATE, 60 * 60);
  - platform: template
    name: "${device_name} Bypass On (12h)"
    icon: mdi:dice-d12
    on_press:
      - lambda: id(${comfoair_id})->set_bypass_mode(zehnder_comfoair_q::BYPASS_ACTIVATE, 12 * 60 * 60);
  - platform: template
    name: "${device_name} Bypass Auto"
    icon: mdi:fan-auto
    on_press:
      - lambda: id(${comfoair_id})->set_bypass_mode(zehnder_comfoair_q::BYPASS_AUTO, 0);
  - platform: template
    name: "${device_name} Bypass Off (1h)"
    icon: mdi:fan-chevron-down
    on_press:
      - lambda: id(${comfoair_id})->set_bypass_mode(zehnder_comfoair_q::BYPASS_DEACTIVATE, 60 * 60);

select:
  - platform: template
    name: '${device_name} Fan Speed'
    id: fan_level_select
    icon: mdi:fan
    options:
     - Away
     - Low
     - Medium
     - High
    set_action:
      - if:
          condition:
            not:
              text_sensor.state:
                id: fan_level
                state: !lambda 'return x;'
          then:
          - lambda: |
              if (x == "Away") {
                id(${comfoair_id})->set_ventilation_level(zehnder_comfoair_q::VENTILATION_LEVEL_AWAY);
              } else if (x == "Low") {
                id(${comfoair_id})->set_ventilation_level(zehnder_comfoair_q::VENTILATION_LEVEL_LOW);
              } else if (x == "Medium") {
                id(${comfoair_id})->set_ventilation_level(zehnder_comfoair_q::VENTILATION_LEVEL_MEDIUM);
              } else if (x == "High") {
                id(${comfoair_id})->set_ventilation_level(zehnder_comfoair_q::VENTILATION_LEVEL_HIGH);
              }
  - platform: template
    name: '${device_name} Temperature Profile'
    id: temperature_profile_select
    icon: mdi:thermometer
    options:
     - "Normal"
     - "Cool"
     - "Warm"
    set_action:
      - if:
          condition:
            not:
              text_sensor.state:
                id: temperature_profile
                state: !lambda 'return x;'
          then:
            - lambda: |
                if (x == "Normal") {
                  id(${comfoair_id})->set_temp_profile(zehnder_comfoair_q::TEMP_PROFILE_NORMAL);
                } else if (x == "Cool") {
                  id(${comfoair_id})->set_temp_profile(zehnder_comfoair_q::TEMP_PROFILE_COOL);
                } else if (x == "Warm") {
                  id(${comfoair_id})->set_temp_profile(zehnder_comfoair_q::TEMP_PROFILE_WARM);
                }
  - platform: template
    name: '${device_name} Temperature Passive'
    id: temperature_passive_select
    icon: mdi:thermometer-minus
    options:
     - "On"
     - "Auto only"
     - "Off"
    optimistic: true
    restore_value: true
    set_action:
      - lambda: |
          if (x == "Off") {
